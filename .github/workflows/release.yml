name: Release

on:
  push:
    branches: 
        - master 

permissions:
  contents: write
  
jobs:
  release:
    name: Release new version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
            RANGE=""
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ -z "$RANGE" ]; then
            COMMITS=$(git log --pretty=%s)
          else
            COMMITS=$(git log "$RANGE" --pretty=%s)
          fi

          BUMP="none"

          if echo "$COMMITS" | grep -Eq '^(feat|fix|perf)(\([^)]+\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -Eq '^feat(\([^)]+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -Eq '^(fix|perf)(\([^)]+\))?:'; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          VERSION_DATE=$(date -u +%F)

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "date=$VERSION_DATE" >> "$GITHUB_OUTPUT"

      - name: Stop if version did not change
        if: steps.version.outputs.changed != 'true'
        run: echo "No version bump needed."

      - name: Update ver.php
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          cat > ver.php <<EOF
          <?php

          \$dl_version = "${{ steps.version.outputs.version }}";
          \$dl_version_date = "${{ steps.version.outputs.date }}";
          EOF

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
      
      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_LOGIN }}
          password: ${{ secrets.FTP_PASSWORD }}
          exclude: |
            **/.git*
            **/.git*/**            
